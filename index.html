<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نئو گیم لند | مرکز بازی‌های آنلاین حرفه‌ای</title>
    <!-- TailwindCSS + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Vazirmatn', 'Orbitron', system-ui, sans-serif;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f1e, #020408);
            color: #eef5ff;
            min-height: 100vh;
        }
        /* افکت نئون و کارت‌های پیشرفته */
        .neon-card {
            background: linear-gradient(135deg, rgba(15, 25, 45, 0.8), rgba(8, 12, 25, 0.9));
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .neon-card:hover {
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 12px 30px rgba(0,0,0,0.6);
            transform: translateY(-8px) scale(1.01);
        }
        .neon-btn {
            transition: all 0.25s;
            box-shadow: 0 0 5px rgba(0,255,255,0.4);
        }
        .neon-btn:hover {
            box-shadow: 0 0 15px cyan;
            background-color: #0ff !important;
            color: #0a0f1e !important;
            transform: scale(1.02);
        }
        .glass-modal {
            background: rgba(3, 8, 20, 0.98);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 32px;
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(cyan, #0ff); border-radius: 10px; }
        .rating-star {
            cursor: pointer;
            transition: 0.1s;
            color: #4b5563;
            font-size: 1.1rem;
        }
        .rating-star.active, .rating-star:hover {
            color: #facc15;
            text-shadow: 0 0 6px gold;
        }
        @keyframes pulse-glow {
            0% { text-shadow: 0 0 2px cyan; opacity: 0.7; }
            100% { text-shadow: 0 0 16px cyan; opacity: 1; }
        }
        .glow-text {
            animation: pulse-glow 1.4s infinite alternate;
        }
        /* لودینگ اختصاصی */
        .custom-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        .loader-content {
            text-align: center;
        }
        .loader-spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(0,255,255,0.2);
            border-top: 5px solid cyan;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .game-canvas {
            background: #0a0f1e;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            display: block;
            margin: 0 auto;
        }
        .glow-border {
            border: 1px solid cyan;
            box-shadow: 0 0 10px cyan;
        }
    </style>
</head>
<body>

    <!-- لودینگ اولیه -->
    <div id="loadingOverlay" class="custom-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <h2 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent animate-pulse">ساخته شده توسط سپهر گودرزی</h2>
            <p class="text-cyan-300 mt-3">بارگذاری بازی‌های نئونی...</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 md:px-6 py-5 relative z-10">
        <!-- HEADER با لوگو و جستجو -->
        <header class="flex flex-wrap items-center justify-between gap-4 mb-8 border-b border-cyan-500/40 pb-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-gamepad text-4xl text-cyan-400 animate-bounce"></i>
                <h1 class="text-2xl md:text-3xl font-bold tracking-wider bg-gradient-to-r from-cyan-300 to-purple-400 bg-clip-text text-transparent">نئو گیم لند</h1>
                <span class="bg-cyan-900/60 text-xs px-3 py-1.5 rounded-full border border-cyan-400 font-mono">🔥 20+ بازی</span>
            </div>
            <div class="flex flex-1 max-w-md gap-2">
                <div class="relative flex-1">
                    <i class="fa fa-search absolute right-3 top-3 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="جستجوی بازی..." class="w-full bg-gray-900/70 border border-cyan-600 rounded-full py-2.5 pr-10 pl-4 text-white focus:outline-none focus:border-cyan-300 focus:ring-1 focus:ring-cyan-400">
                </div>
                <button id="randomGameBtn" class="bg-purple-700 hover:bg-purple-600 text-white px-5 rounded-full flex gap-2 items-center transition-all neon-btn"><i class="fa fa-dice-d6"></i> تصادفی</button>
            </div>
            <div class="flex gap-3">
                <button class="bg-transparent border border-cyan-400 rounded-full px-5 py-2 text-cyan-300 hover:bg-cyan-800/50 transition">ورود</button>
                <button class="bg-gradient-to-r from-cyan-500 to-indigo-600 rounded-full px-6 py-2 font-semibold shadow-lg hover:scale-105 transition">ثبت‌نام</button>
            </div>
        </header>

        <!-- بنر بزرگ جدیدترین بازی -->
        <div class="relative rounded-2xl overflow-hidden mb-12 bg-gradient-to-r from-indigo-950/80 to-black/80 border-2 border-cyan-400/50 shadow-2xl">
            <div class="flex flex-col md:flex-row items-center p-6 gap-6">
                <div class="flex-1 text-right">
                    <span class="text-cyan-300 text-sm uppercase tracking-wider"><i class="fa fa-bolt"></i> جدید & چالش برانگیز</span>
                    <h2 class="text-3xl md:text-5xl font-extrabold my-2">پرش از موانع <span class="text-cyan-300">تصادفی</span></h2>
                    <p class="text-gray-300 mb-4">واکنش سریع، ضربان قلب بالا، موانع غیرمنتظره! رکورد بزن.</p>
                    <button data-game-id="jump_obstacle" class="play-game-btn bg-cyan-500 hover:bg-cyan-600 px-7 py-2.5 rounded-full font-bold shadow-lg transition-all flex gap-2 items-center"><i class="fa fa-gamepad"></i> بازی کن</button>
                </div>
                <div class="w-36 h-36 md:w-48 md:h-48 bg-cyan-900/40 rounded-full flex items-center justify-center border-4 border-cyan-400 animate-pulse">
                    <i class="fa fa-bolt text-7xl text-yellow-300"></i>
                </div>
            </div>
        </div>

        <!-- فیلتر و آمار -->
        <div class="flex flex-wrap justify-between items-center mb-8 gap-3">
            <div class="flex flex-wrap gap-2">
                <button data-cat="all" class="filter-btn active-filter bg-cyan-600 text-white px-5 py-2 rounded-full text-sm font-bold transition">همه</button>
                <button data-cat="action" class="filter-btn bg-gray-800 hover:bg-cyan-800/70 px-5 py-2 rounded-full text-sm">⚡ اکشن</button>
                <button data-cat="puzzle" class="filter-btn bg-gray-800 hover:bg-cyan-800/70 px-5 py-2 rounded-full text-sm">🧩 پازل</button>
                <button data-cat="arcade" class="filter-btn bg-gray-800 hover:bg-cyan-800/70 px-5 py-2 rounded-full text-sm">🕹️ آرکید</button>
                <button data-cat="sports" class="filter-btn bg-gray-800 hover:bg-cyan-800/70 px-5 py-2 rounded-full text-sm">⚽ ورزشی</button>
                <button data-cat="memory" class="filter-btn bg-gray-800 hover:bg-cyan-800/70 px-5 py-2 rounded-full text-sm">🧠 معمایی</button>
            </div>
            <div class="text-cyan-300 text-sm bg-black/50 px-4 py-2 rounded-full border border-cyan-500/30"><i class="fa-regular fa-circle-check"></i> <span id="gameCountDisplay">20</span> بازی آماده</div>
        </div>

        <!-- گرید بازی‌ها (۲۰ عدد کامل) -->
        <div id="gamesGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 transition-all"></div>

        <!-- فوتر زیبا -->
        <footer class="mt-16 pt-6 border-t border-gray-800 text-gray-400 text-sm flex flex-wrap justify-between items-center">
            <div>✨ © 2025 نئو گیم لند | تمامی بازی‌ها رایگان | طراحی نئون مدرن</div>
            <div class="flex gap-5 text-lg"><i class="fab fa-discord hover:text-cyan-400 cursor-pointer"></i> <i class="fab fa-twitter hover:text-cyan-400"></i> <i class="fab fa-instagram hover:text-cyan-400"></i> <span class="hover:text-white cursor-pointer">قوانین</span></div>
        </footer>
    </div>

    <!-- مودال بازی با لودینگ داخلی -->
    <div id="gameModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/90 backdrop-blur-md transition-all duration-300">
        <div class="glass-modal w-11/12 md:w-4/5 lg:w-3/4 xl:w-2/3 max-h-[90vh] overflow-auto p-5 relative shadow-2xl">
            <button id="closeModal" class="absolute left-4 top-4 text-2xl text-white bg-red-800/80 w-9 h-9 rounded-full hover:bg-red-600 z-20 transition">&times;</button>
            <h3 id="modalGameTitle" class="text-2xl font-bold text-cyan-300 mb-3 text-center font-orbitron">بازی</h3>
            <div id="modalGameContent" class="flex justify-center items-center min-h-[450px] bg-gray-900/60 rounded-xl p-3">در حال بارگذاری...</div>
        </div>
    </div>

    <script>
        // لیست ۲۰ بازی کامل + دسته‌بندی و متخلف‌ها
        const GAMES = [
            { id: "snake", name: "مار نئونی", category: "arcade", rating: 4.6, type: "builtin", thumb: "🐍", desc: "بازی کلاسیک مار با گرافیک جذاب", isRebel: false },
            { id: "flappy", name: "فلپ برد چالش", category: "arcade", rating: 4.4, type: "builtin", thumb: "🐦", desc: "پرواز بین لوله‌ها، اعصاب خردکن", isRebel: true },
            { id: "guess", name: "حدس عدد هوشمند", category: "puzzle", rating: 4.2, type: "builtin", thumb: "🔢", desc: "حدس عدد بین ۱ تا ۱۰۰ با راهنمایی", isRebel: false },
            { id: "fast_click", name: "ضربه به هدف متحرک ⚡", category: "action", rating: 4.9, type: "rebel", thumb: "🎯", desc: "هدف سریع - واکنش زیر یک ثانیه!", isRebel: true },
            { id: "color_blind", name: "متن‌های رنگی مزاحم", category: "memory", rating: 4.7, type: "rebel", thumb: "🎨", desc: "فقط رنگ متن رو بگو نه کلمه رو!", isRebel: true },
            { id: "memory_flash", name: "تست حافظه فلش", category: "memory", rating: 4.8, type: "rebel", thumb: "🃏", desc: "دنباله کارت‌ها رو به خاطر بسپار", isRebel: true },
            { id: "tic_tilt", name: "بازی اعصاب تیک‌تاک", category: "action", rating: 4.9, type: "rebel", thumb: "⏰", desc: "به خط قرمز دست نزن!", isRebel: true },
            { id: "jump_obstacle", name: "پرش از موانع", category: "action", rating: 5.0, type: "rebel", thumb: "🏃", desc: "با کلیک یا اسپیس از موانع بپر", isRebel: true },
            { id: "soccer", name: "ضربه پنالتی", category: "sports", rating: 4.1, type: "demo", thumb: "⚽", desc: "شوت دقیق به گوشه دروازه", isRebel: false },
            { id: "basketball", name: "پرتاب سه امتیازی", category: "sports", rating: 4.0, type: "demo", thumb: "🏀", desc: "دقت در پرتاب به حلقه", isRebel: false },
            { id: "tetris", name: "تتریس کلاسیک", category: "puzzle", rating: 4.5, type: "demo", thumb: "🧱", desc: "چینش آجرها لذت‌بخش", isRebel: false },
            { id: "match3", name: "سه‌تایی جواهر", category: "puzzle", rating: 4.3, type: "demo", thumb: "💎", desc: "مچ سه تایی رنگ‌ها", isRebel: false },
            { id: "racing", name: "مسابقه خیابانی", category: "sports", rating: 4.2, type: "demo", thumb: "🏎️", desc: "سبقت و کنترل خودرو", isRebel: false },
            { id: "shooter", name: "تیراندازی وسترن", category: "action", rating: 4.4, type: "demo", thumb: "🔫", desc: "هدف‌های سریع", isRebel: false },
            { id: "spaceinv", name: "مهاجمان فضا", category: "arcade", rating: 4.6, type: "demo", thumb: "👾", desc: "نبرد کهکشانی", isRebel: false },
            { id: "maze", name: "ماز جن زده", category: "puzzle", rating: 4.1, type: "demo", thumb: "🌀", desc: "پیدا کردن خروجی", isRebel: false },
            { id: "dodgeball", name: "توپ های فراری", category: "action", rating: 4.5, type: "demo", thumb: "⚾", desc: "دوری از توپ‌های مرگبار", isRebel: true },
            { id: "chess", name: "شطرنج تاکتیک", category: "memory", rating: 4.7, type: "demo", thumb: "♜", desc: "مسئله مات در دو حرکت", isRebel: false },
            { id: "whack", name: "موش کوب نئون", category: "arcade", rating: 4.3, type: "demo", thumb: "🐭", desc: "ضربه سریع به موش‌ها", isRebel: false },
            { id: "reaction", name: "واکنش‌سنج سریع", category: "action", rating: 4.8, type: "demo", thumb: "⏱️", desc: "سریعترین کلیک جهان", isRebel: true }
        ];

        let userRatings = JSON.parse(localStorage.getItem("gameRatings")) || {};
        let currentFilter = "all";

        function renderGames() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            let filtered = GAMES.filter(g => currentFilter === "all" || g.category === currentFilter);
            if(searchTerm) filtered = filtered.filter(g => g.name.includes(searchTerm) || g.desc.includes(searchTerm));
            document.getElementById("gameCountDisplay").innerText = filtered.length;
            const grid = document.getElementById("gamesGrid");
            if(filtered.length === 0) { grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-16 text-xl">😢 بازی مورد نظر یافت نشد</div>`; return; }
            grid.innerHTML = filtered.map(game => `
                <div class="neon-card rounded-2xl p-4 flex flex-col gap-3 game-card transition" data-id="${game.id}">
                    <div class="text-6xl text-center drop-shadow-lg">${game.thumb}</div>
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-xl text-cyan-200">${game.name}</h3>
                        <span class="text-xs ${game.isRebel ? 'bg-red-700' : 'bg-gray-700'} px-2 py-1 rounded-full font-mono">${game.isRebel ? "🔥 متخلف" : "🎮 عادی"}</span>
                    </div>
                    <p class="text-gray-300 text-sm">${game.desc}</p>
                    <div class="flex justify-between items-center mt-2">
                        <div class="stars-container" data-game-id="${game.id}">${generateStars(game.id, game.rating)}</div>
                        <button data-game-id="${game.id}" class="play-game-btn bg-gradient-to-r from-cyan-700 to-blue-700 hover:from-cyan-500 text-white px-4 py-1.5 rounded-full text-xs transition-all shadow-md"><i class="fa fa-play"></i> اجرا</button>
                    </div>
                </div>
            `).join("");
            attachStarsEvents();
            attachPlayBtns();
        }

        function generateStars(gid, defRating) {
            let saved = userRatings[gid];
            let rating = saved !== undefined ? saved : defRating;
            let full = Math.floor(rating);
            let stars = "";
            for(let i=1;i<=5;i++) stars += `<i class="fa-${i<=full ? 'solid' : 'regular'} fa-star rating-star ${i<=full ? 'active' : ''}" data-star="${i}" data-game="${gid}"></i>`;
            return stars;
        }

        function attachStarsEvents() {
            document.querySelectorAll(".rating-star").forEach(star => {
                star.removeEventListener("click", starClick);
                star.addEventListener("click", starClick);
            });
        }
        function starClick(e) {
            e.stopPropagation();
            const starVal = parseInt(e.target.dataset.star);
            const gid = e.target.dataset.game;
            userRatings[gid] = starVal;
            localStorage.setItem("gameRatings", JSON.stringify(userRatings));
            renderGames();
        }
        function attachPlayBtns() {
            document.querySelectorAll(".play-game-btn").forEach(btn => {
                btn.removeEventListener("click", playGame);
                btn.addEventListener("click", playGame);
            });
        }
        function playGame(e) {
            const gameId = e.currentTarget.dataset.gameId;
            openGameModal(gameId);
        }

        // نمایش مودال با لودینگ اختصاصی
        function openGameModal(gameId) {
            const modal = document.getElementById("gameModal");
            const modalTitle = document.getElementById("modalGameTitle");
            const modalContent = document.getElementById("modalGameContent");
            const game = GAMES.find(g => g.id === gameId);
            if(!game) return;
            modalTitle.innerText = game.name + " | ساخته شده توسط سپهر گودرزی";
            modalContent.innerHTML = `<div class="custom-loader" style="position:relative; background:transparent; backdrop-filter:none; min-height:300px;"><div class="loader-spinner"></div><p class="text-cyan-300 mt-4">بارگذاری بازی نئونی...</p></div>`;
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            // شبیه‌سازی لودینگ سریع
            setTimeout(() => {
                let contentHtml = "";
                if(game.type === "builtin" || game.type === "rebel") {
                    if(game.id === "snake") contentHtml = buildSnakeGame();
                    else if(game.id === "flappy") contentHtml = buildFlappyBird();
                    else if(game.id === "guess") contentHtml = buildGuessNumber();
                    else if(game.id === "fast_click") contentHtml = buildFastClick();
                    else if(game.id === "color_blind") contentHtml = buildColorWord();
                    else if(game.id === "memory_flash") contentHtml = buildMemoryFlash();
                    else if(game.id === "tic_tilt") contentHtml = buildTicTilt();
                    else if(game.id === "jump_obstacle") contentHtml = buildJumpObstacle();
                    else contentHtml = `<div class="text-center p-10"><i class="fa-solid fa-gamepad text-7xl text-cyan-400 mb-4"></i><p class="text-xl">نسخه کامل ${game.name} به زودی...</p><p class="text-gray-400">ساخته شده توسط سپهر گودرزی</p></div>`;
                } else {
                    contentHtml = `<div class="text-center p-10"><i class="fa-regular fa-clock text-6xl text-purple-400 mb-4"></i><p class="text-2xl font-bold">🎮 ${game.name} - نسخه دمو</p><p class="text-gray-300 mt-3">بازی کامل در حال توسعه توسط سپهر گودرزی</p><button onclick="document.getElementById('gameModal').classList.add('hidden')" class="mt-6 bg-cyan-600 px-6 py-2 rounded-full">بستن</button></div>`;
                }
                modalContent.innerHTML = contentHtml;
            }, 600);
        }

        // ---------- سازنده بازی‌های اصلی و متخلف (کدهای جذاب جاوااسکریپت) ----------
        function buildSnakeGame() { return `<canvas id="snakeCanvas" class="game-canvas" width="400" height="400"></canvas><script> (function(){ const canvas=document.getElementById('snakeCanvas'); if(!canvas) return; const ctx=canvas.getContext('2d'); let snake=[{x:10,y:10}], dir='RIGHT', food={x:15,y:10}, score=0, gameLoop; const grid=20; function draw(){ ctx.fillStyle='#0a0f1e'; ctx.fillRect(0,0,400,400); ctx.fillStyle='#0f0'; snake.forEach(seg=>ctx.fillRect(seg.x*grid,seg.y*grid,grid-2,grid-2)); ctx.fillStyle='red'; ctx.fillRect(food.x*grid,food.y*grid,grid-2,grid-2); ctx.fillStyle='cyan'; ctx.font='bold 20px monospace'; ctx.fillText('امتیاز: '+score,10,40); } function move(){ let head={...snake[0]}; if(dir==='RIGHT') head.x++; if(dir==='LEFT') head.x--; if(dir==='UP') head.y--; if(dir==='DOWN') head.y++; if(head.x<0||head.x>=20||head.y<0||head.y>=20||snake.some(seg=>seg.x===head.x&&seg.y===head.y)){ clearInterval(gameLoop); alert('بازی تمام! امتیاز: '+score); return; } snake.unshift(head); if(head.x===food.x&&head.y===food.y){ score++; food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}; } else snake.pop(); draw(); } document.addEventListener('keydown',(e)=>{ if(e.key==='ArrowRight' && dir!=='LEFT') dir='RIGHT'; else if(e.key==='ArrowLeft' && dir!=='RIGHT') dir='LEFT'; else if(e.key==='ArrowUp' && dir!=='DOWN') dir='UP'; else if(e.key==='ArrowDown' && dir!=='UP') dir='DOWN'; }); gameLoop=setInterval(move,150); draw(); })();<\/script>`; }
        function buildFlappyBird() { return `<canvas id="flappyCanvas" class="game-canvas" width="400" height="500"></canvas><script> (function(){ const canvas=document.getElementById('flappyCanvas'); if(!canvas)return; const ctx=canvas.getContext('2d'); let birdY=200, velocity=0, gravity=0.4, jump=-7, pipes=[], frame=0, score=0, gameOn=true; function addPipe(){ pipes.push({x:400, top:Math.random()*200+50, gap:120}); } function update(){ if(!gameOn)return; velocity+=gravity; birdY+=velocity; if(birdY>480||birdY<0) gameOn=false; if(frame%90===0) addPipe(); for(let i=0;i<pipes.length;i++){ pipes[i].x-=3; if(pipes[i].x+60<0) pipes.splice(i,1); if(pipes[i].x<70 && pipes[i].x+60>40 && (birdY<pipes[i].top || birdY>pipes[i].top+pipes[i].gap)) gameOn=false; if(pipes[i].x+30===70) score++; } frame++; draw(); if(gameOn) requestAnimationFrame(update); else alert(`باخت! امتیاز نهایی: ${score}`); } function draw(){ ctx.fillStyle='#03050b'; ctx.fillRect(0,0,400,500); ctx.fillStyle='yellow'; ctx.fillRect(70,birdY,30,30); ctx.fillStyle='lime'; pipes.forEach(p=>{ ctx.fillRect(p.x,0,50,p.top); ctx.fillRect(p.x,p.top+p.gap,50,500-p.top-p.gap); }); ctx.fillStyle='white'; ctx.font='24px monospace'; ctx.fillText(score,20,50); } canvas.addEventListener('click',()=>{if(gameOn) velocity=jump;}); update(); })();<\/script>`; }
        function buildGuessNumber() { return `<div class="text-center p-6"><h3 class="text-2xl text-cyan-300">حدس عدد (۱ تا ۱۰۰)</h3><input type="number" id="guessInput" class="bg-gray-800 p-2 rounded mt-3 text-white"><button id="guessBtn" class="bg-cyan-600 px-4 py-2 rounded mt-3">حدس</button><p id="hintMsg" class="mt-3 text-gray-300"></p><p id="scoreMsg" class="text-yellow-300 mt-2"></p><script> let secret=Math.floor(Math.random()*100)+1, attempts=0; const btn=document.getElementById('guessBtn'), inp=document.getElementById('guessInput'), hint=document.getElementById('hintMsg'), scoreSpan=document.getElementById('scoreMsg'); btn.onclick=()=>{ let val=parseInt(inp.value); if(isNaN(val))return; attempts++; if(val===secret){ hint.innerHTML='🎉 درست! تبریک!'; scoreSpan.innerText='تعداد تلاش: '+attempts; secret=Math.floor(Math.random()*100)+1; attempts=0; } else if(val<secret) hint.innerHTML='🔺 برو بالا'; else hint.innerHTML='🔻 برو پایین'; inp.value=''; };<\/script></div>`; }
        function buildFastClick() { return `<div class="text-center"><div id="target" class="w-24 h-24 bg-red-500 rounded-full cursor-pointer mx-auto transition-all" style="box-shadow:0 0 20px red;"></div><p id="fastScore" class="mt-4 text-xl">امتیاز: 0</p><script> let score=0, target=document.getElementById('target'), scoreSpan=document.getElementById('fastScore'); function move(){ let x=Math.random()*250, y=Math.random()*200; target.style.transform=`translate(${x}px,${y}px)`; } target.onclick=()=>{ score++; scoreSpan.innerText='امتیاز: '+score; move(); }; setInterval(move,800); move();<\/script></div>`; }
        function buildColorWord() { return `<div class="text-center p-6"><p id="colorWord" class="text-4xl font-bold mb-4">آبی</p><div id="colorOptions" class="flex gap-4 justify-center flex-wrap"></div><p id="colorMsg" class="mt-4"></p><script> const words=['قرمز','آبی','سبز','زرد']; const colors=['red','blue','green','gold']; let currentWord, currentColor, score=0; function newRound(){ let idx=Math.floor(Math.random()*words.length); currentWord=words[idx]; let randomColor=colors[Math.floor(Math.random()*colors.length)]; currentColor=randomColor; document.getElementById('colorWord').innerText=currentWord; document.getElementById('colorWord').style.color=currentColor; let btnsDiv=document.getElementById('colorOptions'); btnsDiv.innerHTML=''; colors.forEach(col=>{ let btn=document.createElement('button'); btn.innerText=col; btn.className='bg-gray-700 px-4 py-2 rounded'; btn.onclick=()=>{ if(col===currentColor){ score++; document.getElementById('colorMsg').innerText='✅ درست! امتیاز: '+score; newRound(); } else { document.getElementById('colorMsg').innerText='❌ غلط! امتیاز نهایی: '+score; score=0; newRound(); } }; btnsDiv.appendChild(btn); }); } newRound();<\/script></div>`; }
        function buildMemoryFlash() { return `<div class="text-center"><div id="sequenceDisplay" class="text-3xl font-mono mb-4">?</div><button id="startMem" class="bg-cyan-600 px-4 py-2 rounded">شروع</button><div id="userInputArea" class="mt-4"></div><script> let sequence=[], userInput=[], step=0; const startBtn=document.getElementById('startMem'), display=document.getElementById('sequenceDisplay'), inputArea=document.getElementById('userInputArea'); function genSeq(){ sequence=[]; for(let i=0;i<4;i++) sequence.push(Math.floor(Math.random()*9)+1); display.innerText=sequence.join(' '); setTimeout(()=>{ display.innerText='؟'; userInput=[]; step=0; inputArea.innerHTML='<p class="text-yellow-300">دنباله رو وارد کن (مثل 1 2 3 4)</p><input id="memInput" class="bg-gray-800 p-2 rounded" placeholder="مثال: 1 2 3 4"><button id="submitSeq" class="bg-purple-600 px-3 py-1 rounded">ثبت</button>'; document.getElementById('submitSeq').onclick=()=>{ let vals=document.getElementById('memInput').value.split(' ').map(Number); if(JSON.stringify(vals)===JSON.stringify(sequence)) alert('👍 حافظه قوی!'); else alert('❌ اشتباه! دنباله درست: '+sequence.join(' ')); startBtn.style.display='block'; inputArea.innerHTML=''; }; }, 2000); } startBtn.onclick=()=>{ startBtn.style.display='none'; genSeq(); };<\/script></div>`; }
        function buildTicTilt() { return `<div class="text-center"><canvas id="tiltCanvas" width="400" height="300" class="border-2 border-red-500"></canvas><p>❌ از خط قرمز دوری کن! با موس حرکت نکن</p><script> const canv=document.getElementById('tiltCanvas'), ctx=canv.getContext('2d'); let x=200; function draw(){ ctx.fillStyle='black'; ctx.fillRect(0,0,400,300); ctx.fillStyle='red'; ctx.fillRect(0,140,400,20); ctx.fillStyle='cyan'; ctx.fillRect(x-15,120,30,40); } function move(e){ let rect=canv.getBoundingClientRect(); let mx=e.clientX-rect.left; if(mx>20&&mx<380) x=mx; if(x>180&&x<220) alert('به خط قرمز برخورد کردی! بازی باخت.'); draw(); } canv.addEventListener('mousemove',move); draw();<\/script></div>`; }
        function buildJumpObstacle() { return `<canvas id="jumpCanvas" width="500" height="300" class="game-canvas"></canvas><script> const canv=document.getElementById('jumpCanvas'), ctx=canv.getContext('2d'); let playerY=220, isJump=false, velocity=0, gravity=0.8, obstacleX=500, score=0; function update(){ ctx.fillStyle='#0a0f1e'; ctx.fillRect(0,0,500,300); ctx.fillStyle='lime'; ctx.fillRect(50,playerY,30,30); ctx.fillStyle='red'; ctx.fillRect(obstacleX,230,25,40); if(obstacleX<-30) { obstacleX=500; score++; } if(obstacleX>50&&obstacleX<80&&playerY+30>230) alert('باخت! امتیاز: '+score); obstacleX-=5; if(isJump){ velocity+=gravity; playerY+=velocity; if(playerY>=220){ playerY=220; isJump=false; velocity=0;} } ctx.fillStyle='white'; ctx.fillText('امتیاز: '+score,20,40); requestAnimationFrame(update); } canv.addEventListener('click',()=>{ if(!isJump){ isJump=true; velocity=-12;} }); update();<\/script>`; }

        // رندوم بازی و فیلترها
        document.getElementById("randomGameBtn").addEventListener("click",()=>{ let rand=GAMES[Math.floor(Math.random()*GAMES.length)]; openGameModal(rand.id); });
        document.querySelectorAll(".filter-btn").forEach(btn=>{ btn.addEventListener("click",()=>{ document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active-filter","bg-cyan-600")); btn.classList.add("active-filter","bg-cyan-600"); currentFilter=btn.dataset.cat; renderGames(); }); });
        document.getElementById("searchInput").addEventListener("input",()=>renderGames());
        document.getElementById("closeModal").addEventListener("click",()=>document.getElementById("gameModal").classList.add("hidden"));
        window.onclick=(e)=>{if(e.target===document.getElementById("gameModal")) document.getElementById("gameModal").classList.add("hidden");};
        
        // حذف لودینگ بعد از ۱ ثانیه
        setTimeout(()=>{ document.getElementById("loadingOverlay").style.opacity="0"; setTimeout(()=>document.getElementById("loadingOverlay").style.display="none",500); }, 1300);
        renderGames();
    </script>
</body>
