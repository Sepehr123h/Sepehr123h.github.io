<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>پازل هوشمند |ساخت سپهر چیدمان درست قطعات</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
            font-family: 'Segoe UI', 'Vazir', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 248, 225, 0.95);
            border-radius: 48px;
            padding: 20px 25px 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            direction: ltr;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            background: #2c3e33d9;
            padding: 15px 20px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            direction: ltr;
        }

        .ctrl-group {
            background: #fff6e8;
            padding: 5px 15px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .ctrl-group label {
            font-weight: bold;
            color: #2c3e2f;
        }

        input, button {
            font-family: inherit;
            border-radius: 40px;
            border: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #f0f0f0;
        }

        input {
            background: white;
            border: 1px solid #c0c0c0;
            cursor: text;
        }

        button {
            background: #ffb74d;
            color: #2d2b26;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.96);
        }

        .primary-btn {
            background: #4c7a5a;
            color: white;
        }

        .timer-music {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #1e2a2e;
            padding: 5px 25px;
            border-radius: 60px;
            color: #ffefcf;
        }

        .timer {
            font-size: 2rem;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 3px;
            background: #00000066;
            padding: 0 20px;
            border-radius: 48px;
        }

        .puzzle-area {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-top: 10px;
        }

        .board {
            flex: 2;
            min-width: 280px;
            background: #b7a77e;
            padding: 12px;
            border-radius: 24px;
            box-shadow: inset 0 0 0 1px #e9ddb0, 0 12px 20px rgba(0,0,0,0.2);
            overflow-x: auto;
            overflow-y: auto;
        }

        .board h3 {
            text-align: center;
            margin-top: 0;
            color: #2d2418;
        }

        .slots-grid {
            display: grid;
            gap: 0px;
            background: #8b7656;
            padding: 0px;
            justify-content: center;
            width: 100%;
            margin: 0 auto;
        }

        .slot {
            background-color: #cbbd9b;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            cursor: grab;
            aspect-ratio: 1 / 1;
            width: 100%;
            height: auto;
        }

        .slot.empty {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238b6944"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>');
            background-size: 30%;
            background-position: center;
            background-color: #a48c6b;
        }

        .slot.filled {
            border: none;
            background-size: cover;
        }

        .slot.permanent-error {
            outline: 4px solid #ff3333;
            filter: drop-shadow(0 0 5px red);
            background-color: #ffcccc;
        }

        .slot.temp-error {
            outline: 4px solid #ff8888;
            background-color: #ffdddd;
            transition: 0.1s;
        }

        .pieces-panel {
            flex: 1.5;
            min-width: 260px;
            background: #2f2e2bdb;
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 15px;
            color: white;
        }

        .pieces-panel h3 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .pieces-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 460px;
            overflow-y: auto;
            padding: 10px 5px;
        }

        .puzzle-piece {
            width: 85px;
            height: 85px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 12px;
            box-shadow: 0 6px 12px black;
            cursor: grab;
            transition: 0.1s linear;
            border: 2px solid #ffd966;
            touch-action: pan-y;
        }

        .puzzle-piece:active, .slot:active {
            cursor: grabbing;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .status {
            background: #2d2b26;
            padding: 6px 18px;
            border-radius: 32px;
            color: #ffeaac;
            font-weight: bold;
            font-size: 0.9rem;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
        }

        .dragging {
            opacity: 0.6;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="controls">
        <div class="ctrl-group">
            <label>📸 عکس:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>
        <div class="ctrl-group">
            <label>🔢 سطرها (۲ تا ۹):</label>
            <input type="number" id="rowsInput" min="2" max="9" value="3" style="width:75px">
        </div>
        <div class="ctrl-group">
            <label>📐 ستون‌ها (۲ تا ۹):</label>
            <input type="number" id="colsInput" min="2" max="9" value="3" style="width:75px">
        </div>
        <button id="shuffleBtn">♻️ بر هم زدن قطعات</button>
        <button id="resetGameBtn">🔄 شروع مجدد</button>
        <div class="timer-music">
            <span>⏱️</span>
            <span class="timer" id="timerDisplay">00:00</span>
            <button id="musicToggleBtn">🎵 موزیک هیجانی</button>
        </div>
    </div>

    <div class="puzzle-area">
        <div class="board">
            <h3>📌 تخته پازل (بکشید و رها کنید)</h3>
            <div id="slotsGrid" class="slots-grid"></div>
        </div>
        <div class="pieces-panel">
            <h3>🧩 قطعات (بکشید روی تخته)</h3>
            <div id="piecesContainer" class="pieces-container"></div>
            <div class="info-bar">
                <div class="status" id="statusMsg">📸 لطفاً یک عکس انتخاب کنید</div>
            </div>
        </div>
    </div>
    <footer>⭐ قطعه را بگیرید و روی خانه تخته رها کنید. با چیدمان درست، پازل کامل می‌شود.</footer>
</div>

<script>
    // ----------------------------------- عناصر DOM
    const imageUpload = document.getElementById('imageUpload');
    const rowsInput = document.getElementById('rowsInput');
    const colsInput = document.getElementById('colsInput');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetGameBtn = document.getElementById('resetGameBtn');
    const slotsGridDiv = document.getElementById('slotsGrid');
    const piecesContainer = document.getElementById('piecesContainer');
    const timerDisplay = document.getElementById('timerDisplay');
    const statusMsgSpan = document.getElementById('statusMsg');
    const musicToggleBtn = document.getElementById('musicToggleBtn');

    // ----------------------------------- وضعیت پازل
    let currentImageBase64 = null;
    let rows = 3, cols = 3;
    let pieceSize = 0;
    let masterPieces = [];
    let remainingPieces = [];
    let boardPieces = [];
    let slotElements = [];
    let puzzleCompleted = false;
    let allPlaced = false;
    let timerInterval = null;
    let timerSeconds = 0;
    let isGameActive = false;

    // متغیرهای درگ لمسی
    let touchDragElement = null;
    let touchDragData = null;

    // ------ موزیک هیجانی
    let audioCtx = null;
    let musicActive = false;
    let musicInterval = null;
    const energeticMelody = [523.25, 587.33, 659.25, 523.25, 587.33, 659.25, 783.99, 880.00, 987.77, 880.00, 783.99, 659.25];
    let noteIndex = 0;

    // ========== تبدیل عکس به مربع ==========
    function cropImageToSquare(imgElement) {
        return new Promise((resolve) => {
            const size = Math.min(imgElement.width, imgElement.height);
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const sx = (imgElement.width - size) / 2;
            const sy = (imgElement.height - size) / 2;
            ctx.drawImage(imgElement, sx, sy, size, size, 0, 0, size, size);
            resolve(canvas.toDataURL('image/png'));
        });
    }

    async function sliceSquareImageDirect(imgBase64, rowsNum, colsNum) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = async () => {
                const squareDataURL = await cropImageToSquare(img);
                const squareImg = new Image();
                squareImg.onload = () => {
                    const tileSize = squareImg.width / colsNum;
                    pieceSize = tileSize;
                    const tiles = [];
                    for (let r = 0; r < rowsNum; r++) {
                        for (let c = 0; c < colsNum; c++) {
                            const canvas = document.createElement('canvas');
                            canvas.width = tileSize;
                            canvas.height = tileSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(squareImg, c * tileSize, r * tileSize, tileSize, tileSize, 0, 0, tileSize, tileSize);
                            const dataURL = canvas.toDataURL('image/png');
                            tiles.push({ row: r, col: c, dataURL });
                        }
                    }
                    resolve(tiles);
                };
                squareImg.onerror = reject;
                squareImg.src = squareDataURL;
            };
            img.onerror = reject;
            img.src = imgBase64;
        });
    }

    async function buildPuzzle(imgBase64, rowsNum, colsNum) {
        if (!imgBase64) return false;
        statusMsgSpan.innerText = 'در حال ساخت پازل...';
        try {
            const tiles = await sliceSquareImageDirect(imgBase64, rowsNum, colsNum);
            masterPieces = tiles;
            remainingPieces = [...masterPieces];
            for (let i = remainingPieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [remainingPieces[i], remainingPieces[j]] = [remainingPieces[j], remainingPieces[i]];
            }
            boardPieces = Array(rowsNum).fill().map(() => Array(colsNum).fill(null));
            rows = rowsNum;
            cols = colsNum;
            puzzleCompleted = false;
            allPlaced = false;
            renderBoard();
            renderPieces();
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
            startTimer();
            statusMsgSpan.innerText = `پازل ${rows}x${cols} آماده است. قطعات را بکشید.`;
            return true;
        } catch (err) {
            console.error(err);
            statusMsgSpan.innerText = 'خطا در ساخت پازل';
            return false;
        }
    }

    function resetGame() {
        if (!masterPieces.length) return;
        remainingPieces = [...masterPieces];
        for (let i = remainingPieces.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [remainingPieces[i], remainingPieces[j]] = [remainingPieces[j], remainingPieces[i]];
        }
        boardPieces = Array(rows).fill().map(() => Array(cols).fill(null));
        puzzleCompleted = false;
        allPlaced = false;
        renderBoard();
        renderPieces();
        stopTimer();
        timerSeconds = 0;
        updateTimerDisplay();
        startTimer();
        statusMsgSpan.innerText = 'بازی از اول شروع شد.';
    }

    function renderBoard() {
        slotsGridDiv.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        slotsGridDiv.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        slotsGridDiv.innerHTML = '';
        slotElements = [];
        for (let r = 0; r < rows; r++) {
            slotElements[r] = [];
            for (let c = 0; c < cols; c++) {
                const piece = boardPieces[r][c];
                const slot = document.createElement('div');
                slot.className = 'slot';
                if (piece) {
                    slot.style.backgroundImage = `url('${piece.dataURL}')`;
                    slot.classList.add('filled');
                    slot.classList.remove('empty');
                    attachDragEvents(slot, { type: 'board', row: r, col: c, pieceRow: piece.row, pieceCol: piece.col });
                } else {
                    slot.classList.add('empty');
                    slot.style.backgroundImage = '';
                    slot.removeAttribute('draggable');
                    slot.addEventListener('dragover', (e) => e.preventDefault());
                    slot.addEventListener('drop', handleDrop);
                }
                slot.setAttribute('data-row', r);
                slot.setAttribute('data-col', c);
                slotsGridDiv.appendChild(slot);
                slotElements[r][c] = slot;
            }
        }
        if (allPlaced && !puzzleCompleted) validateAndHighlight();
    }

    function attachDragEvents(el, data) {
        el.setAttribute('draggable', 'true');
        el.addEventListener('dragstart', (e) => {
            if (puzzleCompleted) { e.preventDefault(); return false; }
            e.dataTransfer.setData('text/plain', JSON.stringify(data));
            e.dataTransfer.effectAllowed = 'move';
            el.style.opacity = '0.5';
        });
        el.addEventListener('dragend', (e) => { el.style.opacity = '1'; });
        el.addEventListener('touchstart', onTouchStart);
        el.addEventListener('touchmove', onTouchMove);
        el.addEventListener('touchend', onTouchEnd);
    }

    function handleDrop(e) {
        e.preventDefault();
        const raw = e.dataTransfer.getData('text/plain');
        if (!raw) return;
        const data = JSON.parse(raw);
        const targetSlot = e.target.closest('.slot');
        if (!targetSlot) return;
        const targetRow = parseInt(targetSlot.getAttribute('data-row'));
        const targetCol = parseInt(targetSlot.getAttribute('data-col'));
        if (isNaN(targetRow)) return;
        if (data.type === 'board') {
            movePieceOnBoard(data.row, data.col, targetRow, targetCol);
        } else if (data.type === 'panel') {
            placePieceFromPanel(data.pieceRow, data.pieceCol, targetRow, targetCol);
        }
    }

    function showTempError(row, col) {
        const slot = slotElements[row][col];
        if (!slot) return;
        slot.classList.add('temp-error');
        setTimeout(() => slot.classList.remove('temp-error'), 500);
    }

    function movePieceOnBoard(srcRow, srcCol, dstRow, dstCol) {
        if (puzzleCompleted) return;
        const sourcePiece = boardPieces[srcRow][srcCol];
        if (!sourcePiece) return;
        const targetPiece = boardPieces[dstRow][dstCol];
        if (sourcePiece.row !== dstRow || sourcePiece.col !== dstCol) {
            showTempError(dstRow, dstCol);
            statusMsgSpan.innerText = `⚠️ جای اشتباه! قطعه (${sourcePiece.row+1},${sourcePiece.col+1}) باید در خانه (${sourcePiece.row+1},${sourcePiece.col+1}) باشد.`;
        } else {
            statusMsgSpan.innerText = `✅ قطعه در جای صحیح قرار گرفت.`;
        }
        boardPieces[dstRow][dstCol] = sourcePiece;
        boardPieces[srcRow][srcCol] = targetPiece;
        renderBoard();
        renderPieces();
        checkCompletion();
    }

    function placePieceFromPanel(pieceRow, pieceCol, dstRow, dstCol) {
        if (puzzleCompleted) return;
        const pieceIndex = remainingPieces.findIndex(p => p.row === pieceRow && p.col === pieceCol);
        if (pieceIndex === -1) return;
        const piece = remainingPieces[pieceIndex];
        const existing = boardPieces[dstRow][dstCol];
        if (piece.row !== dstRow || piece.col !== dstCol) {
            showTempError(dstRow, dstCol);
            statusMsgSpan.innerText = `⚠️ جای اشتباه! قطعه (${piece.row+1},${piece.col+1}) باید در خانه (${piece.row+1},${piece.col+1}) باشد.`;
        } else {
            statusMsgSpan.innerText = `✅ قطعه در جای صحیح قرار گرفت.`;
        }
        if (existing) {
            remainingPieces.push(existing);
        }
        boardPieces[dstRow][dstCol] = piece;
        remainingPieces.splice(pieceIndex, 1);
        renderBoard();
        renderPieces();
        checkCompletion();
    }

    function checkCompletion() {
        let filled = 0;
        for (let i = 0; i < rows; i++)
            for (let j = 0; j < cols; j++)
                if (boardPieces[i][j] !== null) filled++;
        const total = rows * cols;
        if (filled === total && remainingPieces.length === 0) {
            allPlaced = true;
            validateAndHighlight();
        } else {
            allPlaced = false;
            clearPermanentErrors();
            if (puzzleCompleted) {
                puzzleCompleted = false;
                startTimer();
            }
        }
    }

    function clearPermanentErrors() {
        for (let i = 0; i < rows; i++)
            for (let j = 0; j < cols; j++)
                if (slotElements[i][j]) slotElements[i][j].classList.remove('permanent-error');
    }

    function validateAndHighlight() {
        let correct = true;
        clearPermanentErrors();
        for (let i = 0; i < rows; i++) {
            for (let j = 0; j < cols; j++) {
                const piece = boardPieces[i][j];
                if (piece) {
                    if (piece.row !== i || piece.col !== j) {
                        correct = false;
                        const slot = slotElements[i][j];
                        if (slot) slot.classList.add('permanent-error');
                    }
                } else {
                    correct = false;
                }
            }
        }
        if (correct && allPlaced) {
            if (!puzzleCompleted) {
                puzzleCompleted = true;
                stopTimer();
                statusMsgSpan.innerText = '🎉 عالی! پازل کاملاً درست چیده شد. زمان متوقف شد. 🎉';
                playWinBlip();
            }
        } else if (allPlaced && !correct) {
            statusMsgSpan.innerText = '⚠️ همه قطعات چیده شدند، اما جای برخی اشتباه است. خانه‌های قرمز را اصلاح کنید.';
            if (puzzleCompleted) puzzleCompleted = false;
            if (!isGameActive) startTimer();
        }
    }

    function renderPieces() {
        piecesContainer.innerHTML = '';
        remainingPieces.forEach(piece => {
            const div = document.createElement('div');
            div.className = 'puzzle-piece';
            div.style.backgroundImage = `url('${piece.dataURL}')`;
            div.style.width = '85px';
            div.style.height = '85px';
            attachDragEvents(div, { type: 'panel', pieceRow: piece.row, pieceCol: piece.col });
            piecesContainer.appendChild(div);
        });
    }

    function shuffleRemaining() {
        if (!masterPieces.length || puzzleCompleted) {
            statusMsgSpan.innerText = 'پازل ساخته نشده یا کامل شده!';
            return;
        }
        for (let i = remainingPieces.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [remainingPieces[i], remainingPieces[j]] = [remainingPieces[j], remainingPieces[i]];
        }
        renderPieces();
        statusMsgSpan.innerText = 'قطعات پنل برهم زده شدند.';
    }

    // ========== درگ لمسی ==========
    function onTouchStart(e) {
        if (puzzleCompleted) return;
        const target = e.target.closest('.puzzle-piece, .slot.filled');
        if (!target) return;
        e.preventDefault();
        touchDragElement = target;
        if (target.classList.contains('puzzle-piece')) {
            const idx = Array.from(piecesContainer.children).indexOf(target);
            if (idx !== -1 && remainingPieces[idx]) {
                touchDragData = { type: 'panel', pieceRow: remainingPieces[idx].row, pieceCol: remainingPieces[idx].col };
            }
        } else if (target.classList.contains('slot') && target.classList.contains('filled')) {
            const row = parseInt(target.getAttribute('data-row'));
            const col = parseInt(target.getAttribute('data-col'));
            const piece = boardPieces[row][col];
            if (piece) {
                touchDragData = { type: 'board', row, col, pieceRow: piece.row, pieceCol: piece.col };
            }
        }
        target.classList.add('dragging');
    }

    function onTouchMove(e) {
        if (!touchDragElement) return;
        e.preventDefault();
    }

    function onTouchEnd(e) {
        if (!touchDragElement || !touchDragData) {
            if (touchDragElement) touchDragElement.classList.remove('dragging');
            touchDragElement = null;
            touchDragData = null;
            return;
        }
        e.preventDefault();
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const elemUnderTouch = document.elementsFromPoint(endX, endY);
        let targetSlot = null;
        for (let el of elemUnderTouch) {
            if (el.classList && el.classList.contains('slot')) {
                targetSlot = el;
                break;
            }
        }
        if (targetSlot) {
            const targetRow = parseInt(targetSlot.getAttribute('data-row'));
            const targetCol = parseInt(targetSlot.getAttribute('data-col'));
            if (!isNaN(targetRow)) {
                if (touchDragData.type === 'board') {
                    movePieceOnBoard(touchDragData.row, touchDragData.col, targetRow, targetCol);
                } else if (touchDragData.type === 'panel') {
                    placePieceFromPanel(touchDragData.pieceRow, touchDragData.pieceCol, targetRow, targetCol);
                }
            }
        }
        touchDragElement.classList.remove('dragging');
        touchDragElement = null;
        touchDragData = null;
    }

    // ========== تایمر ==========
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        if (puzzleCompleted) return;
        isGameActive = true;
        timerInterval = setInterval(() => {
            if (!isGameActive || puzzleCompleted) return;
            timerSeconds++;
            updateTimerDisplay();
        }, 1000);
    }
    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        isGameActive = false;
    }
    function updateTimerDisplay() {
        const mins = Math.floor(timerSeconds / 60);
        const secs = timerSeconds % 60;
        timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    // ========== موزیک ==========
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playExcitingNote(freq, duration = 0.25) {
        if (!audioCtx || !musicActive) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.value = 0.15;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.stop(now + duration);
    }
    function startEnergeticMelody() {
        if (musicInterval) clearInterval(musicInterval);
        musicActive = true;
        noteIndex = 0;
        musicInterval = setInterval(() => {
            if (!musicActive) return;
            playExcitingNote(energeticMelody[noteIndex % energeticMelody.length], 0.2);
            noteIndex++;
        }, 280);
    }
    function stopMelody() {
        if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
        musicActive = false;
    }
    function toggleMusic() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                if (!musicActive) { startEnergeticMelody(); musicToggleBtn.innerText = '🔊 موزیک هیجانی'; }
                else { stopMelody(); musicToggleBtn.innerText = '🎵 موزیک هیجانی'; }
            });
        } else {
            if (!musicActive) { startEnergeticMelody(); musicToggleBtn.innerText = '🔊 موزیک هیجانی'; }
            else { stopMelody(); musicToggleBtn.innerText = '🎵 موزیک هیجانی'; }
        }
    }
    function playWinBlip() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
        osc.stop(audioCtx.currentTime + 0.8);
    }

    // ========== رویدادهای اصلی ==========
    imageUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            currentImageBase64 = ev.target.result;
            const r = parseInt(rowsInput.value);
            const c = parseInt(colsInput.value);
            if (r >= 2 && r <= 9 && c >= 2 && c <= 9) {
                await buildPuzzle(currentImageBase64, r, c);
            } else {
                await buildPuzzle(currentImageBase64, 3, 3);
            }
        };
        reader.readAsDataURL(file);
    });

    async function onDimensionChange() {
        if (currentImageBase64) {
            const r = parseInt(rowsInput.value);
            const c = parseInt(colsInput.value);
            if (r >= 2 && r <= 9 && c >= 2 && c <= 9) {
                await buildPuzzle(currentImageBase64, r, c);
            }
        }
    }
    rowsInput.addEventListener('change', onDimensionChange);
    colsInput.addEventListener('change', onDimensionChange);
    shuffleBtn.addEventListener('click', shuffleRemaining);
    resetGameBtn.addEventListener('click', () => { if (masterPieces.length) resetGame(); });
    musicToggleBtn.addEventListener('click', toggleMusic);

    function initPlaceholder() {
        rows = 3; cols = 3;
        boardPieces = Array(3).fill().map(() => Array(3).fill(null));
        remainingPieces = [];
        renderBoard();
        piecesContainer.innerHTML = '<div style="padding:20px;text-align:center;">عکس انتخاب کنید</div>';
    }
    initPlaceholder();
</script>
</body>
